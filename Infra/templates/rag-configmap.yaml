{{- if .Values.rag.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-rag-config
  labels:
    component: rag
    {{- include "backend.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.rag.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
