{{- if .Values.retrieval.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-retrieval
  labels:
    component: retrieval
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.retrieval.service.type }}
  ports:
    - port: {{ .Values.retrieval.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    component: retrieval
    {{- include "backend.selectorLabels" . | nindent 4 }}
{{- end }}
