{{- if .Values.retrieval.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-retrieval-config
  labels:
    component: retrieval
    {{- include "backend.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.retrieval.env }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
{{- end }}
