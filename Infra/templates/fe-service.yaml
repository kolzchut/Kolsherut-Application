apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-fe
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    component: frontend
    {{- include "backend.selectorLabels" . | nindent 4 }}
