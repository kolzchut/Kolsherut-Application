apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}-be
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  # UPDATED PATH: .Values.backend.service
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    component: backend
    {{- include "backend.selectorLabels" . | nindent 4 }}