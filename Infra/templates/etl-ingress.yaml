{{- if .Values.etl.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "backend.fullname" . }}-etl
  labels:
    component: etl
    {{- include "backend.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.etl.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.etl.ingress.className }}
  tls:
    - hosts:
      {{- range .Values.etl.ingress.hosts }}
        - {{ .host | quote }}
      {{- end }}
      secretName: tls-secret-name
  rules:
    {{- range .Values.etl.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "backend.fullname" $ }}-etl
                port:
                  number: {{ $.Values.etl.service.port }}
          {{- end }}
    {{- end }}
{{- end }}