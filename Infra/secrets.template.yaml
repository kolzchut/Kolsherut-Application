# ---------------------------------------------------------
# SECRETS TEMPLATE
# Copy this file to 'secrets-prod.yaml' (or -dev, -staging) 
# and fill in the values. DO NOT COMMIT THE FILLED FILE.
# ---------------------------------------------------------

registryCredentials:
  password: "" # Docker Registry Password

secrets:
  # --- Infrastructure ---
  ELASTIC_USERNAME: "elastic"
  ELASTIC_PASS: "" # Required
  
  # --- Cronicle Auth ---
  CRONICLE_ADMIN_USER: "admin"
  CRONICLE_ADMIN_PASS: "" # Required
  
  # --- Email ---
  # Only if providing raw credentials here
  EMAIL_NOTIFIER_SENDER_EMAIL: "notifier.etl@gmail.com"
  EMAIL_NOTIFIER_PASSWORD: "" # Required
  EMAIL_NOTIFIER_RECIPIENT_LIST: "" # comma separated

  # --- ETL OPERATORS CONFIG ---
  DATAFLOWS_AIRTABLE_APIKEY: ""
  ETL_AIRTABLE_BASE: ""
  ETL_AIRTABLE_STAGING_BASE: ""
  ETL_AIRTABLE_ALTERNATE_BASE: ""
  ETL_AIRTABLE_DATAENTRY_BASE: ""
  ETL_AIRTABLE_DATA_IMPORT_BASE: ""
  
  ETL_GUIDESTAR_USERNAME: ""
  ETL_GUIDESTAR_PASSWORD: ""
  
  ETL_GOVMAP_API_KEY: ""
  
  ETL_GOOGLE_MAPS_API_KEY: ""

  # Base64 of the full Google service account JSON key (Drive access)
  ETL_GOOGLE_SERVICE_ACCOUNT_JSON_BASE64: ""
  
  KZ_GITHUB_TOKEN: ""
  KZ_KOLSHERUT_APPLICATION_GITHUB_TOKEN: ""

# ---------------------------------------------------------
# ETL Specific Secrets
# ---------------------------------------------------------
etl:
  env:
    CRONICLE_secret_key: "" # Required

# ---------------------------------------------------------
# Frontend Storage Account Credentials
# ---------------------------------------------------------
frontend:
  persistence:
    azureStorageAccountName: "" # Required - Azure Storage Account name
    azureStorageAccountKey: ""  # Required - Azure Storage Account access key
    azureFileShareName: ""      # Required - Azure File Share name
