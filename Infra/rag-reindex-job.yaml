# ---------------------------------------------------------
# One-shot RAG reindex Job (standalone - `kubectl apply -f` once).
# Curls the synchronous POST /api/cards/reindex to embed ALL cards (~20k).
# Talks to the in-cluster ClusterIP service (no ingress => no 60s proxy timeout).
#
#   kubectl apply -f rag-reindex-job.yaml            # optionally: -n <namespace>
#   kubectl logs -f job/kolsherut-rag-reindex
#   kubectl delete -f rag-reindex-job.yaml           # clean up when done
#
# NOTE: the service host below assumes the Helm release name is "kolsherut"
# (service = kolsherut-rag). Change it if your release/namespace differs.
# ---------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: kolsherut-rag-reindex
  labels:
    component: rag-reindex
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400   # auto-remove the finished Job after 24h
  template:
    metadata:
      labels:
        component: rag-reindex
    spec:
      restartPolicy: Never
      # Wait until the RAG service is up and its models are warmed
      # (/health only answers once warm_models() has finished).
      initContainers:
        - name: wait-for-rag
          image: curlimages/curl:8.11.0
          command:
            - 'sh'
            - '-c'
            - |
              until curl -sf "http://kolsherut-rag:8200/health"; do
                echo "waiting for rag service to become ready..."
                sleep 5
              done
      containers:
        - name: reindex
          image: curlimages/curl:8.11.0
          command:
            - 'sh'
            - '-c'
            - |
              set -e
              echo "Triggering full reindex of all card embeddings (this can take a while)..."
              curl -sS --fail-with-body \
                --connect-timeout 30 \
                -X POST \
                -H 'Content-Type: application/json' \
                -d '{}' \
                -w '\nHTTP %{http_code} in %{time_total}s\n' \
                "http://kolsherut-rag:8200/api/cards/reindex"
              echo "Reindex finished."
