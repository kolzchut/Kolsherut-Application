user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map_hash_bucket_size 1024;
    map_hash_max_size 8192;

    # ----------------------------------------------------------
    # 1. Simplified Bot Detection
    # ----------------------------------------------------------
    map $http_user_agent $is_bot {
        default 0;
        ~*KolSherutBot 0;
        ~*(googlebot|bingbot|yandex|baiduspider|duckduckbot) 1;
        ~*(facebookexternalhit|twitterbot|linkedinbot|pinterest|slackbot) 1;
        ~*(whatsapp|telegrambot|discordbot|applebot) 1;
        ~*(curl|wget|python-requests|KolsherutTestBot) 1;
    }

    # Redirect Map (Common)
    map $request_uri $new_uri {
        default "";
        include /etc/nginx/redirects.map;
    }

    etag off;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    server {
        # -----------------------------------------------------
        # Production Listeners & Domains (FROM PRODUCTION)
        # -----------------------------------------------------
        listen 4000 default_server;
        listen [::]:4000 default_server;
        server_name prod.kolsherut.org.il;

        charset utf-8;

        port_in_redirect off;
        server_name_in_redirect on;
        absolute_redirect off;

        root   /usr/share/nginx/html;

        # Ensure directory requests look for index.html
        index home/index.html index.html index.htm;

        # -----------------------------------------------------
        # 2. Handle Redirects First
        # -----------------------------------------------------
        if ($new_uri) {
            return 301 $new_uri;
        }

        # -----------------------------------------------------
        # 3. URL Rewrites
        # -----------------------------------------------------


        # -----------------------------------------------------
        # 4. Main Routing Logic
        # -----------------------------------------------------
        location / {
            # 1. Look for file
            # 2. Look for directory index file directly to avoid 301
            # 3. Go to decision logic (SSR vs SPA)
            try_files $uri $uri/index.html @decision_logic;

            # Headers for static files
            add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            # CORS Headers
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'x-request-id,Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # Special case for homepage to serve SSGed content
        location = / {
            # 1. Look for SSGed home
            # 2. Go to decision logic (SSR vs SPA)
            try_files home/index.html @decision_logic;
        }

        # -----------------------------------------------------
        # 5. Decision Logic
        # -----------------------------------------------------
        location @decision_logic {
            # Logic: If file is missing AND it is a bot -> SSR
            if ($is_bot) {
                error_page 418 = @bot_ssr;
                return 418;
            }

            # Logic: If file is missing AND it is a human -> SPA
            rewrite ^ /index.html last;
        }

        # -----------------------------------------------------
        # 6. Bot SSR Proxy
        # -----------------------------------------------------
        location @bot_ssr {
            # Sends request to API (e.g. /ssr/p/card/123)
            proxy_pass https://be.kolsherut.org.il/ssr$request_uri;

            proxy_set_header Host be.kolsherut.org.il;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_ciphers HIGH:!aNULL:!MD5;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent "KolSherutBot/1.0";

            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header X-SSR-Original-Host $host;
        }

        # -----------------------------------------------------
        # 7. Sitemaps
        # -----------------------------------------------------
        location /sitemap/cards.xml {
            proxy_pass https://be.kolsherut.org.il/sitemap/cards;
            proxy_set_header Host be.kolsherut.org.il;
            proxy_ssl_server_name on;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /sitemap/taxonomy.xml {
            proxy_pass https://be.kolsherut.org.il/sitemap/taxonomy;
            proxy_set_header Host be.kolsherut.org.il;
            proxy_ssl_server_name on;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /sitemap/mixedtaxonomy.xml {
            proxy_pass https://be.kolsherut.org.il/sitemap/mixedtaxonomy;
            proxy_set_header Host be.kolsherut.org.il;
            proxy_ssl_server_name on;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /sitemap/organizations.xml {
            proxy_pass https://be.kolsherut.org.il/sitemap/organizations;
            proxy_set_header Host be.kolsherut.org.il;
            proxy_ssl_server_name on;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /sitemap/services.xml {
            proxy_pass https://be.kolsherut.org.il/sitemap/services;
            proxy_set_header Host be.kolsherut.org.il;
            proxy_ssl_server_name on;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
